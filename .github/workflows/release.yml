name: Build & Release ZIP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: SvenDasGoogle

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(grep -oP '"version":\s*"\K[^"]+' SvenDasGoogle/composer.json)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build plugin ZIP
        run: |
          ZIP_NAME="SvenDasGoogle-${{ steps.version.outputs.version }}.zip"
          zip -r "$ZIP_NAME" SvenDasGoogle \
            -x "SvenDasGoogle/.git/*" \
               "SvenDasGoogle/.github/*" \
               "SvenDasGoogle/.gitignore" \
               "SvenDasGoogle/*.code-workspace"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
